<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Starting Butterfly Effect&hellip;</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 440px;
      padding: 40px 28px;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Butterfly ── */
    .butterfly-wrap {
      margin-bottom: 32px;
      position: relative;
      display: inline-block;
    }

    .butterfly-wrap svg {
      width: 96px;
      height: 96px;
      animation: float 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(10, 132, 255, 0.45))
              drop-shadow(0 0 6px rgba(48, 209, 88, 0.3));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0)   rotate(-1.5deg) scale(1);    }
      50%       { transform: translateY(-12px) rotate(1.5deg) scale(1.04); }
    }

    /* ── Title ── */
    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: #f5f5f7;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #48484a;
      margin-bottom: 40px;
      letter-spacing: 0.03em;
    }

    /* ── Stage label ── */
    .stage {
      font-size: 1rem;
      color: #aeaeb2;
      min-height: 1.5em;
      margin-bottom: 18px;
      transition: opacity 0.35s ease;
    }

    /* ── Progress bar ── */
    .progress-track {
      width: 100%;
      height: 3px;
      background: #1c1c1e;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 28px;
    }

    .progress-fill {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, #0a84ff 0%, #30d158 100%);
      border-radius: 2px;
      animation: shimmy 1.7s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes shimmy {
      0%   { transform: translateX(-140%); }
      100% { transform: translateX(370%);  }
    }

    /* ── Sims quip ── */
    .quip {
      font-size: 0.78rem;
      color: #3a3a3c;
      min-height: 1.3em;
      font-style: italic;
      transition: opacity 0.3s ease;
    }

    /* ── Subtle background sparkles ── */
    .sparks {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: twinkle var(--d) ease-in-out var(--delay) infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50%       { opacity: 0.6; transform: scale(1); }
    }
  </style>
</head>
<body>

  <!-- Background sparkles -->
  <div class="sparks" id="sparks"></div>

  <div class="container">
    <div class="butterfly-wrap">
      <!-- Butterfly SVG — exact paths from favicon.svg scaled to 96×96 -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="96" height="96" aria-hidden="true">
        <path d="M15 15 C12 9 4 7 5 13 C6 17 12 17 15 17 Z" fill="#30d158"/>
        <path d="M15 17 C9 21 3 27 7 29 C11 31 14 22 15 17 Z" fill="#1ea83c"/>
        <path d="M17 15 C20 9 28 7 27 13 C26 17 20 17 17 17 Z" fill="#0a84ff"/>
        <path d="M17 17 C23 21 29 27 25 29 C21 31 18 22 17 17 Z" fill="#0060cc"/>
        <ellipse cx="16" cy="16" rx="2" ry="6" fill="#2c2c2e"/>
        <circle cx="16" cy="16" r="3" fill="#ff9f0a"/>
        <line x1="16" y1="13.5" x2="16" y2="18.5" stroke="#1c1c1e" stroke-width="1.1" stroke-linecap="round"/>
        <line x1="14.3" y1="15" x2="17.7" y2="15" stroke="#1c1c1e" stroke-width="1" stroke-linecap="round"/>
        <line x1="14.3" y1="17" x2="17.7" y2="17" stroke="#1c1c1e" stroke-width="1" stroke-linecap="round"/>
      </svg>
    </div>

    <h1>Butterfly Effect</h1>
    <p class="subtitle">Personal finance &middot; powered by Monarch</p>

    <div class="stage" id="stage">🦋 Waking up Butterfly Effect&hellip;</div>

    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>

    <div class="quip" id="quip">Reticulating splines&hellip;</div>
  </div>

  <script>
  (function () {
    'use strict';

    // ── Stage messages keyed by elapsed seconds ─────────────────────────────
    var stages = [
      [0,  '\u{1F98B} Waking up Butterfly Effect\u2026'],
      [3,  '\u{1F40D} Warming up the Python environment\u2026'],
      [9,  '\u{1F4E6} Installing dependencies\u2026'],
      [22, '\u{1F680} Starting the forecast engine\u2026'],
      [42, '\u231B Brewing the perfect storm\u2026'],
    ];

    // ── Sims-style rotating quips ───────────────────────────────────────────
    var quips = [
      'Reticulating splines\u2026',
      'Calibrating butterfly wings for maximum flappiness\u2026',
      'Calculating the butterfly effect on your bank account\u2026',
      'Teaching butterflies to read spreadsheets\u2026',
      'Untangling financial spaghetti\u2026',
      'Negotiating with pip\u2026 it has demands',
      'Establishing quantum entanglement with Monarch Money\u2026',
      'Optimizing chaos theory algorithms\u2026',
      'Counting your money (virtually, of course)\u2026',
      'Installing the Oxford comma support package\u2026',
      'Consulting the butterfly oracle\u2026',
      'Defragmenting your financial anxiety\u2026',
    ];

    var stageEl = document.getElementById('stage');
    var quipEl  = document.getElementById('quip');
    var start   = Date.now();
    var quipIdx = 0;

    // ── Advance stage label based on elapsed time ───────────────────────────
    function updateStage() {
      var elapsed = (Date.now() - start) / 1000;
      var label = stages[0][1];
      for (var i = 0; i < stages.length; i++) {
        if (elapsed >= stages[i][0]) label = stages[i][1];
      }
      if (stageEl.textContent !== label) {
        stageEl.style.opacity = '0';
        setTimeout(function () {
          stageEl.textContent = label;
          stageEl.style.opacity = '1';
        }, 175);
      }
    }

    // ── Rotate quips with a fade ─────────────────────────────────────────────
    function rotateQuip() {
      quipEl.style.opacity = '0';
      setTimeout(function () {
        quipIdx = (quipIdx + 1) % quips.length;
        quipEl.textContent = quips[quipIdx];
        quipEl.style.opacity = '1';
      }, 300);
    }

    // ── Poll Flask via Image() — bypasses file:// CORS restrictions ──────────
    function checkReady() {
      var img = new Image();
      img.onload = function () {
        // Flask is up — navigate this tab to the app (settings or dashboard)
        window.location.href = 'http://localhost:5002/';
      };
      img.onerror = function () {
        setTimeout(checkReady, 1000);
      };
      // Cache-bust so the browser never reuses a prior response
      img.src = 'http://localhost:5002/_ping?' + Date.now();
    }

    // ── Scatter a few tiny sparkles in the background ────────────────────────
    function makeSparks() {
      var container = document.getElementById('sparks');
      var colors = ['#0a84ff', '#30d158', '#ff9f0a', '#bf5af2', '#ff375f'];
      for (var i = 0; i < 22; i++) {
        var el = document.createElement('div');
        el.className = 'spark';
        var size = Math.random() * 4 + 2;
        el.style.cssText = [
          'width:' + size + 'px',
          'height:' + size + 'px',
          'left:' + (Math.random() * 100) + '%',
          'top:' + (Math.random() * 100) + '%',
          'background:' + colors[Math.floor(Math.random() * colors.length)],
          '--d:' + (Math.random() * 3 + 2) + 's',
          '--delay:' + (Math.random() * 4) + 's',
        ].join(';');
        container.appendChild(el);
      }
    }

    // ── Boot ─────────────────────────────────────────────────────────────────
    quipEl.textContent = quips[0];
    updateStage();
    makeSparks();

    setInterval(updateStage, 1000);
    setInterval(rotateQuip, 3200);

    // Wait 1 second before first poll — server is definitely not up yet
    setTimeout(checkReady, 1000);
  })();
  </script>
</body>
</html>
